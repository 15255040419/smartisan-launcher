name: Build and Release APK

on:
  push:
    tags:
      - 'v*'   # 当推送 v 开头的 Tag 时自动触发，例如 v1.5.2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Read release config
        id: conf
        run: |
          source tools/release.conf
          echo "version=${RELEASE_BASE_VERSION}-${RELEASE_SUFFIX}" >> $GITHUB_OUTPUT
          echo "version_code=${RELEASE_VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Build APK with apktool
        run: |
          mkdir -p build
          java -jar tools/apktool.jar b . -o build/unsigned.apk

      - name: Generate debug keystore
        run: |
          mkdir -p build/signing
          keytool -genkeypair \
            -keystore build/signing/debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Sign APK
        run: |
          cp build/unsigned.apk build/signed.apk
          jarsigner \
            -keystore build/signing/debug.keystore \
            -storepass android \
            -keypass android \
            build/signed.apk androiddebugkey

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF_NAME}
          mv build/signed.apk build/smartisan-launcher-maintained-${TAG}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Smartisan Launcher Maintained ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          files: build/smartisan-launcher-maintained-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
